{% extends "layout.html" %}

{% block content %}
<div class="container">

    <form id="newResponseForm">
        {% for question in questions %}
        <div class="card mt-2" data-question-id="{{ question.question_id }}">
            <div class="card-header">
            {{ question.question_text }}
            </div>
            <div class="card-body">
                {% for question_opt in questions_opt %}
                {% if question_opt.question_id == question.question_id %}
                <div class="form-check" data-question-option-id="{{ question_opt.question_option_id }}">
                    <input class="form-check-input"
                    type="radio"
                    name="question_{{ question.question_id }}"
                    id="flexRadioDefault{{loop.index}}">
                    <label class="form-check-label" for="flexRadioDefault{{loop.index}}">
                    {{ question_opt.value }}
                    </label>
                </div>
                {% endif %}
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                Enviar Resposta
            </button>
        </div>
    </form>
</div>
{% endblock %}
{% block script %}
<script src="{{ url_for('static', path='/js/pages/response.js') }}"></script>
{% endblock %}
